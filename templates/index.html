<!DOCTYPE html>
<html>
<head>
<title>JIG管理システム</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{margin:0;display:flex;font-family:Arial}

/* SIDEBAR */
.sidebar{
width:250px;background:#2f3542;color:white;padding:15px;height:100vh;
}

.menu-title{margin-top:15px;font-weight:bold;}

.sidebar button{
width:100%;margin:5px 0;padding:10px;background:#57606f;color:white;
border:none;border-radius:5px;text-align:left;cursor:pointer;
}

.sidebar button:hover{background:#747d8c}

/* CONTENT */
.content{flex:1;padding:20px;background:#f1f2f6;}

/* CARD */
.card{background:white;padding:15px;margin-bottom:15px;border-radius:10px;}

/* DASHBOARD */
.dashboard{display:flex;gap:15px;margin-top:15px;}
.dcard{flex:1;padding:20px;border-radius:10px;color:white;text-align:center;}
.total{background:#1e90ff}
.borrow{background:#ff4757}
.free{background:#2ed573}

/* TABLE */
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ccc;padding:8px;text-align:center}

/* STATUS */
.selected-row{background:#2ed573;color:white}
.borrowed-row{background:#ff6b6b;color:white}
.disabled-btn{background:#aaa !important;cursor:not-allowed}

#reader,#reader-return{width:300px;margin-top:10px}

/* COMMENT */
textarea{
width:100%;
height:300px;
padding:10px;
font-size:16px;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
}
</style>
</head>

<body>

<div class="sidebar">
<h2><i class="fa-solid fa-toolbox"></i> JIGシステム</h2>

<div class="menu-title">Dashboard</div>
<button onclick="show('home')">ホーム</button>
<button onclick="show('borrow')">貸出</button>
<button onclick="show('return')">返却</button>

<div class="menu-title">Monitor</div>
<button onclick="show('logs')">ログ</button>
<button onclick="show('comment')">コメント</button>

<div class="menu-title">Admin</div>
<button id="adminBtn" onclick="show('admin')">管理</button>
</div>

<div class="content">

<!-- HOME -->
<div id="home" class="card">
<h2>{{username}} さん</h2>

<div class="dashboard">
<div class="dcard total">総数<br><span id="total">0</span></div>
<div class="dcard borrow">使用中<br><span id="using">0</span></div>
<div class="dcard free">空き<br><span id="free">0</span></div>
</div>

<h3>Information</h3>
<div id="infoBox"></div>

</div>

<!-- BORROW -->
<div id="borrow" class="card" style="display:none">
<h3>JIG貸出</h3>

<button onclick="startScan()">Scan</button>
<div id="reader"></div>

<table>
<tr><th>JIG</th><th>画像</th><th>操作</th></tr>
<tbody id="tb"></tbody>
</table>

<h4>選択中:</h4>
<div id="selectedList"></div>

<button onclick="confirmBorrow()">確定</button>

<h4>QRコード</h4>
<canvas id="qr"></canvas>
</div>

<!-- RETURN -->
<div id="return" class="card" style="display:none">
<h3>返却</h3>
<button onclick="startReturnScan()">Scan Return</button>
<div id="reader-return"></div>
</div>

<!-- LOG -->
<div id="logs" class="card" style="display:none">
<h3>履歴ログ</h3>

<table>
<tr>
<th>JIG</th>
<th>ユーザー</th>
<th>状態</th>
<th>時間</th>
</tr>
<tbody id="logTable"></tbody>
</table>

</div>

<!-- COMMENT -->
<div id="comment" class="card" style="display:none">
<h3>コメント</h3>

<input id="cmtJig" placeholder="対象JIG">
<textarea id="cmtText" placeholder="コメント入力"></textarea>

<button onclick="sendComment()">送信</button>
</div>

<!-- ADMIN -->
<div id="admin" class="card" style="display:none">
<h3>JIG管理</h3>

<input id="name" placeholder="JIG名">
<input id="img" placeholder="画像URL">
<button onclick="addJig()">追加</button>

<hr>

<h4>コメント管理</h4>
<div id="commentAdmin"></div>

</div>

</div>

<script>

let user=new URLSearchParams(location.search).get("user")
let selected=[]
let statusData={}
let scannerBorrow=null
let scannerReturn=null

// ===== ADMIN HIDE =====
if(user !== "admin"){
document.getElementById("adminBtn").style.display="none"
}

// NAV
function show(id){
["home","borrow","return","logs","comment","admin"].forEach(x=>{
let el=document.getElementById(x)
if(el) el.style.display="none"
})

document.getElementById(id).style.display="block"

if(id==="logs") loadLogs()
if(id==="admin") loadCommentAdmin()
}

// DASHBOARD
async function loadDashboard(){
let jigs=await (await fetch("/jigs")).json()
statusData=await (await fetch("/jig-status")).json()

let using=0
jigs.forEach(j=>{
if(statusData[j.name]=="BORROW") using++
})

document.getElementById("total").innerText=jigs.length
document.getElementById("using").innerText=using
document.getElementById("free").innerText=jigs.length-using
}
setInterval(loadDashboard,3000)
loadDashboard()

// INFO
async function loadInfo(){
let data=await (await fetch("/comments")).json()
let box=document.getElementById("infoBox")
box.innerHTML=""

data.forEach(c=>{
box.innerHTML+=`
<div style="background:#fff3cd;padding:8px;margin:5px;border-radius:5px">
<b>${c.jig}</b> : ${c.text}
</div>`
})
}
setInterval(loadInfo,3000)
loadInfo()

// LOAD JIG
async function loadJigs(){
let data=await (await fetch("/jigs")).json()
statusData=await (await fetch("/jig-status")).json()

let tb=document.getElementById("tb")
tb.innerHTML=""

data.forEach(j=>{
let isBorrowed=statusData[j.name]=="BORROW"

let tr=document.createElement("tr")
tr.id="row-"+j.name

if(isBorrowed) tr.classList.add("borrowed-row")

tr.innerHTML=`
<td>${j.name}</td>
<td><img src="${j.image}" width="80"></td>
<td>
<button onclick="selectJig('${j.name}')" 
${isBorrowed?"disabled class='disabled-btn'":""}>
選択
</button>
</td>
`
tb.appendChild(tr)
})
}

// SELECT
function selectJig(j){
if(statusData[j]=="BORROW") return

let row=document.getElementById("row-"+j)

if(selected.includes(j)){
selected=selected.filter(x=>x!==j)
row.classList.remove("selected-row")
}else{
selected.push(j)
row.classList.add("selected-row")
}

document.getElementById("selectedList").innerHTML=selected.join("<br>")
}

// SCAN BORROW
function startScan(){
if(scannerBorrow) scannerBorrow.stop()

scannerBorrow=new Html5Qrcode("reader")
scannerBorrow.start({facingMode:"environment"},{fps:10},(decoded)=>{
selectJig(decoded)
})
}

// BORROW (BATCH)
async function confirmBorrow(){

if(selected.length===0){
alert("選択してください")
return
}

let res=await fetch("/borrow",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({jigs:selected,user:user})
})

if(!res.ok){
let err=await res.json()
alert(err.detail)
return
}

let url=location.origin+"/return-page?jigs="+selected.join(",")
QRCode.toCanvas(document.getElementById("qr"),url)

selected=[]
document.getElementById("selectedList").innerHTML=""
loadJigs()
}

// RETURN
function startReturnScan(){

if(scannerReturn) scannerReturn.stop()

scannerReturn=new Html5Qrcode("reader-return")

scannerReturn.start({facingMode:"environment"},{fps:10},async(decoded)=>{

if(decoded.includes("return-page")){
let url=new URL(decoded)
let jigs=url.searchParams.get("jigs").split(",")

await fetch("/return",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({jigs:jigs,user:user})
})

alert("一括返却")
}else{

await fetch("/return",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({jigs:[decoded],user:user})
})

alert("返却: "+decoded)
}

loadJigs()
})
}

// LOG
async function loadLogs(){
let data=await (await fetch("/logs")).json()

let tb=document.getElementById("logTable")
tb.innerHTML=""

data.forEach(l=>{
tb.innerHTML+=`
<tr>
<td>${l.jig_name}</td>
<td>${l.user}</td>
<td>${l.status}</td>
<td>${l.time}</td>
</tr>`
})
}

// COMMENT
async function sendComment(){
let jig=document.getElementById("cmtJig").value
let text=document.getElementById("cmtText").value

await fetch("/comment",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({jig:jig,text:text,user:user})
})

alert("送信完了")
document.getElementById("cmtText").value=""
loadInfo()
}

// ADMIN COMMENT
async function loadCommentAdmin(){
let data=await (await fetch("/comments")).json()
let box=document.getElementById("commentAdmin")
box.innerHTML=""

data.forEach(c=>{
box.innerHTML+=`
<div>
${c.jig} - ${c.text}
<button onclick="delComment(${c.id})">削除</button>
</div>`
})
}

async function delComment(id){
let form=new FormData()
form.append("id",id)

await fetch("/delete-comment",{method:"POST",body:form})
loadCommentAdmin()
}

// ADMIN JIG
async function addJig(){
let name=document.getElementById("name").value
let img=document.getElementById("img").value

await fetch("/add-jig",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({jig_name:name,image:img})
})

loadJigs()
}

loadJigs()

</script>

</body>
</html>
