<!DOCTYPE html>
<html>
<head>
<title>JIG管理システム</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{margin:0;display:flex;font-family:Arial}

.sidebar{
width:250px;
background:#2f3542;
color:white;
padding:15px;
height:100vh;
}

.menu-title{margin-top:15px;font-weight:bold;}

.sidebar button{
width:100%;
margin:5px 0;
padding:10px;
background:#57606f;
color:white;
border:none;
border-radius:5px;
text-align:left;
cursor:pointer;
}

.sidebar button:hover{background:#747d8c}

.content{flex:1;padding:20px;background:#f1f2f6;}

.card{background:white;padding:15px;margin-bottom:15px;border-radius:10px;}

.dashboard{display:flex;gap:15px;margin-top:15px;}
.dcard{flex:1;padding:20px;border-radius:10px;color:white;text-align:center;}
.total{background:#1e90ff}
.borrow{background:#ff4757}
.free{background:#2ed573}

table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ccc;padding:8px;text-align:center}

.selected-row{background:#2ed573;color:white}
.borrowed-row{background:#ff6b6b;color:white}

input,textarea{
width:100%;
padding:10px;
margin-bottom:10px;
}

textarea{height:200px}
</style>
</head>

<body>

<div class="sidebar">
<h2>JIGシステム</h2>

<div class="menu-title">Dashboard</div>
<button onclick="show('home')">ホーム</button>
<button onclick="show('borrow')">貸出</button>
<button onclick="show('return')">返却</button>

<div class="menu-title">Monitor</div>
<button onclick="show('logs')">ログ</button>
<button onclick="show('comment')">コメント</button>

<div id="adminMenu">
<div class="menu-title">Admin</div>
<button onclick="show('admin')">管理</button>
</div>
</div>

<div class="content">

<!-- HOME -->
<div id="home" class="card">
<h2>{{username}} さん</h2>

<div class="dashboard">
<div class="dcard total">総数<br><span id="total">0</span></div>
<div class="dcard borrow">使用中<br><span id="using">0</span></div>
<div class="dcard free">空き<br><span id="free">0</span></div>
</div>

<h3>Information</h3>
<div id="infoBox"></div>
</div>

<!-- BORROW -->
<div id="borrow" class="card" style="display:none">
<h3>JIG貸出</h3>

<button onclick="loadJigs()">Reload</button>

<table>
<tr><th>JIG</th><th>画像</th><th>操作</th></tr>
<tbody id="tb"></tbody>
</table>

<h4>選択中</h4>
<div id="selectedList"></div>

</div>

<!-- RETURN -->
<div id="return" class="card" style="display:none">
<h3>返却</h3>
</div>

<!-- LOG -->
<div id="logs" class="card" style="display:none">
<h3>LOG</h3>
</div>

<!-- COMMENT -->
<div id="comment" class="card" style="display:none">
<h3>COMMENT</h3>
</div>

<!-- ADMIN -->
<div id="admin" class="card" style="display:none">
<h3>ADMIN</h3>
</div>

</div>

<script>

let selected = []
let statusData = {}

/* ================= SAFE FETCH ================= */
async function safeFetch(url){
    try{
        let res = await fetch(url)
        let text = await res.text()
        return JSON.parse(text)
    }catch(e){
        return {ok:true,data:[]}
    }
}

/* ================= NAV ================= */
function show(id){

    let tabs=["home","borrow","return","logs","comment","admin"]

    tabs.forEach(t=>{
        let el=document.getElementById(t)
        if(el) el.style.display="none"
    })

    let target=document.getElementById(id)
    if(target) target.style.display="block"

    // 🔥 FIX: AUTO LOAD WHEN OPEN TAB
    if(id==="borrow"){
        loadJigs()
    }
}

/* ================= DASHBOARD ================= */
async function loadDashboard(){

    let jigs = await safeFetch("/jigs")
    let status = await safeFetch("/jig-status")

    jigs = jigs.data || jigs || []
    status = status.data || status || {}

    let using = 0

    jigs.forEach(j=>{
        if(status[j.name] === "BORROW"){
            using++
        }
    })

    let t=document.getElementById("total")
    let u=document.getElementById("using")
    let f=document.getElementById("free")

    if(t) t.innerText = jigs.length
    if(u) u.innerText = using
    if(f) f.innerText = jigs.length - using
}

/* ================= LOAD JIG LIST (FIX MAIN ISSUE) ================= */
async function loadJigs(){

    let jigs = await safeFetch("/jigs")
    let status = await safeFetch("/jig-status")

    jigs = jigs.data || jigs || []
    status = status.data || status || {}

    let tb = document.getElementById("tb")
    if(!tb) return

    tb.innerHTML = ""

    jigs.forEach(j=>{

        let isBorrowed = status[j.name] === "BORROW"

        let tr = document.createElement("tr")

        if(isBorrowed){
            tr.classList.add("borrowed-row")
        }

        tr.innerHTML = `
        <td>${j.name}</td>
        <td><img src="${j.image}" width="60"></td>
        <td>
            <button ${isBorrowed ? "disabled" : ""}
            onclick="selectJig('${j.name}')">
            選択
            </button>
        </td>
        `

        tb.appendChild(tr)
    })
}

/* ================= SELECT ================= */
function selectJig(j){

    let row = document.getElementById("row-"+j)

    if(selected.includes(j)){
        selected = selected.filter(x=>x!==j)
    }else{
        selected.push(j)
    }

    let box=document.getElementById("selectedList")
    if(box) box.innerHTML = selected.join("<br>")
}

/* ================= INIT ================= */
window.onload = () => {
    show("home")
    loadDashboard()
}

/* ================= AUTO REFRESH ================= */
setInterval(loadDashboard,5000)

</script>

</body>
</html>
