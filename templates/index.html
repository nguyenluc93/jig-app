<!DOCTYPE html>
<html>
<head>
<title>JIG System</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{margin:0;display:flex;font-family:Arial}

/* SIDEBAR */
.sidebar{
width:250px;
background:#2f3542;
color:white;
padding:15px;
height:100vh;
}

.menu-title{
font-weight:bold;
margin-top:15px;
}

.sidebar button{
width:100%;
padding:10px;
margin:5px 0;
border:none;
background:#57606f;
color:white;
cursor:pointer;
border-radius:5px;
}

.sidebar button:hover{background:#747d8c}

/* CONTENT */
.content{
flex:1;
padding:20px;
background:#f1f2f6;
}

/* CARD */
.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
}
th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

.green{background:#2ed573;color:white}
.red{background:#ff4757;color:white}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>JIG System</h2>

<div class="menu-title">Dashboard</div>
<button onclick="show('home')">Home</button>
<button onclick="show('borrow')">Mượn JIG</button>
<button onclick="show('return')">Trả JIG</button>
<button onclick="show('reserve')">Đặt trước</button>

<div class="menu-title">Monitor</div>
<button onclick="show('logs')">Logs</button>
<button onclick="show('comment')">Comment</button>
</div>

<!-- CONTENT -->
<div class="content">

<!-- HOME -->
<div id="home" class="card">
<h2>Xin chào {{username}}</h2>
<p>Chào mừng đến hệ thống quản lý JIG</p>
</div>

<!-- STATUS -->
<div class="card">
<h3>Trạng thái JIG</h3>
<div id="status"></div>
</div>

<!-- BORROW -->
<div id="borrow" class="card" style="display:none">
<h3>Mượn JIG</h3>

<table>
<tr>
<th>JIG</th>
<th>Image</th>
<th>Action</th>
</tr>
<tbody id="tb"></tbody>
</table>

<br>
<button onclick="confirmBorrow()">Xác nhận</button>

<h4>QR</h4>
<canvas id="qr"></canvas>
</div>

<!-- RETURN -->
<div id="return" class="card" style="display:none">
<h3>Scan QR để trả</h3>
<div id="reader"></div>
</div>

<!-- RESERVE -->
<div id="reserve" class="card" style="display:none">
<h3>Đặt trước</h3>
<input id="resJig">
<button onclick="reserve()">Đặt</button>
<div id="queue"></div>
</div>

<!-- LOG -->
<div id="logs" class="card" style="display:none">
<h3>Logs</h3>
<div id="logList"></div>
</div>

<!-- COMMENT -->
<div id="comment" class="card" style="display:none">
<h3>Comment</h3>
<textarea id="cmt"></textarea>
<br>
<button onclick="addComment()">Gửi</button>
<div id="cmtList"></div>
</div>

</div>

<script>

let user=new URLSearchParams(location.search).get("user")
let jigs=["A","B","C"]
let selected=[]

// NAV
function show(id){
["home","borrow","return","reserve","logs","comment"].forEach(x=>{
document.getElementById(x).style.display="none"
})
document.getElementById(id).style.display="block"

if(id==="return") startScan()
}

// TABLE
let tb=document.getElementById("tb")

jigs.forEach(j=>{
let tr=document.createElement("tr")
tr.innerHTML=`
<td>${j}</td>
<td><button onclick="view('${j}')">View</button></td>
<td><button onclick="selectJig('${j}')">Chọn</button></td>
`
tb.appendChild(tr)
})

function view(j){
window.open("/static/images/"+j+".jpg")
}

function selectJig(j){
if(!selected.includes(j)) selected.push(j)
alert(j+" selected")
}

// BORROW
async function confirmBorrow(){
for(let j of selected){
await fetch("/borrow",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({jig_name:j,user:user})
})
}

let url=location.origin+"/return-page?jigs="+selected.join(",")
QRCode.toCanvas(document.getElementById("qr"),url)
}

// CAMERA SCAN
function startScan(){
let scanner=new Html5Qrcode("reader")

scanner.start({facingMode:"environment"},{fps:10,qrbox:250},
(text)=>{
window.location.href=text
})
}

// STATUS
async function loadStatus(){
let res=await fetch("/jig-status")
let data=await res.json()

let el=document.getElementById("status")
el.innerHTML=""

Object.keys(data).forEach(j=>{
let d=document.createElement("div")

if(data[j]=="BORROW"){
d.className="red"
d.innerText=j+" đang dùng"
}else{
d.className="green"
d.innerText=j+" free"
}

el.appendChild(d)
})
}
setInterval(loadStatus,3000)
loadStatus()

// LOG
async function loadLog(){
let res=await fetch("/logs")
let data=await res.json()

let el=document.getElementById("logList")
el.innerHTML=""

data.forEach(l=>{
let d=document.createElement("div")
d.innerText=`${l.jig} | ${l.status} | M:${l.borrow||""} | R:${l.return||""} | ${l.time}`
el.appendChild(d)
})
}
setInterval(loadLog,3000)
loadLog()

// RESERVE
async function reserve(){
let j=document.getElementById("resJig").value
await fetch("/reserve",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({jig_name:j,user:user})
})
}

// COMMENT
async function addComment(){
let t=document.getElementById("cmt").value
await fetch("/comment",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({user:user,content:t})
})
}

</script>

</body>
</html>
