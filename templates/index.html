<!DOCTYPE html>
<html>
<head>
<title>JIG</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body{margin:0;display:flex;font-family:Arial}
.sidebar{width:220px;background:#2f3542;color:white;padding:20px;height:100vh}
.sidebar button{width:100%;margin:5px 0;padding:10px}
.content{flex:1;padding:20px;background:#f1f2f6}
.card{background:white;padding:20px;margin-bottom:15px;border-radius:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,120px);gap:10px}
.jig{padding:10px;text-align:center;border-radius:8px;background:#dfe4ea;cursor:pointer}
.green{background:#2ed573;color:white}
.red{background:#ff4757;color:white}
</style>
</head>

<body>

<div class="sidebar">
<h2>JIG</h2>
<button onclick="show('dash')">Dashboard</button>
<button onclick="show('comment')">Comment</button>
</div>

<div class="content">

<div id="dash">
<div class="card">
<h2>Welcome {{username}}</h2>
</div>

<div class="card">
<button onclick="tab('borrow')">Borrow</button>
<button onclick="tab('return')">Return</button>
<button onclick="tab('reserve')">Reserve</button>
</div>

<div id="status" class="card">
<h3>Status</h3>
<div id="statusGrid" class="grid"></div>
</div>

<div id="borrow" class="card" style="display:none">
<div id="jigs" class="grid"></div>
<button onclick="borrow()">Confirm</button>
<canvas id="qr"></canvas>
</div>

<div id="return" class="card" style="display:none">
<input id="returnJig">
<button onclick="returnJig()">Return</button>
</div>

<div id="reserve" class="card" style="display:none">
<input id="resJig">
<button onclick="reserve()">Reserve</button>
</div>

</div>

<div id="comment" style="display:none">
<div class="card">
<textarea id="cmt"></textarea>
<button onclick="addComment()">Send</button>
<div id="cmtList"></div>
</div>
</div>

</div>

<script>

let user=new URLSearchParams(location.search).get("user")
let jigs=["A","B","C","D","E"]
let selected=[]

function show(id){
document.getElementById("dash").style.display="none"
document.getElementById("comment").style.display="none"
document.getElementById(id).style.display="block"
}

function tab(id){
["borrow","return","reserve"].forEach(x=>document.getElementById(x).style.display="none")
document.getElementById(id).style.display="block"
}

function render(){
let el=document.getElementById("jigs")
jigs.forEach(j=>{
let d=document.createElement("div")
d.className="jig"
d.innerText=j
d.onclick=()=>{
d.classList.toggle("green")
selected.includes(j)?selected=selected.filter(x=>x!==j):selected.push(j)
}
el.appendChild(d)
})
}
render()

async function borrow(){
for(let j of selected){
await fetch("/borrow",{method:"POST",headers:{'Content-Type':'application/json'},
body:JSON.stringify({jig_name:j,user:user})})
}
QRCode.toCanvas(document.getElementById("qr"),selected.join(","))
}

async function returnJig(){
let j=document.getElementById("returnJig").value
await fetch("/return",{method:"POST",headers:{'Content-Type':'application/json'},
body:JSON.stringify({jig_name:j,user:user})})
}

async function reserve(){
let j=document.getElementById("resJig").value
await fetch("/reserve",{method:"POST",headers:{'Content-Type':'application/json'},
body:JSON.stringify({jig_name:j,user:user})})
}

async function loadStatus(){
let res=await fetch("/jig-status")
let data=await res.json()

let el=document.getElementById("statusGrid")
el.innerHTML=""

jigs.forEach(j=>{
let d=document.createElement("div")
d.className="jig"

if(data[j] && data[j].status==="BORROW"){
d.classList.add("red")
d.innerText=j+" ("+(data[j].user||"")+ ")"
}else{
d.classList.add("green")
d.innerText=j+" (free)"
}
el.appendChild(d)
})
}
setInterval(loadStatus,3000)
loadStatus()

async function addComment(){
let text=document.getElementById("cmt").value
await fetch("/comment",{method:"POST",headers:{'Content-Type':'application/json'},
body:JSON.stringify({user:user,content:text})})
loadComment()
}

async function loadComment(){
let res=await fetch("/comment")
let data=await res.json()

let el=document.getElementById("cmtList")
el.innerHTML=""

data.forEach(c=>{
let d=document.createElement("div")
d.innerText=c.user+" : "+c.content
el.appendChild(d)
})
}
setInterval(loadComment,5000)
loadComment()

</script>

</body>
</html>
