<!DOCTYPE html>
<html>
<head>
<title>JIG管理システム</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{margin:0;display:flex;font-family:Arial}

/* SIDEBAR (GIỮ NGUYÊN) */
.sidebar{
width:250px;
background:#2f3542;
color:white;
padding:15px;
height:100vh;
}

.menu-title{margin-top:15px;font-weight:bold;}

.sidebar button{
width:100%;
margin:5px 0;
padding:10px;
background:#57606f;
color:white;
border:none;
border-radius:5px;
text-align:left;
cursor:pointer;
}

.sidebar button:hover{background:#747d8c}

/* CONTENT */
.content{flex:1;padding:20px;background:#f1f2f6;}

/* CARD */
.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

/* DASHBOARD */
.dashboard{display:flex;gap:15px;margin-top:15px;}
.dcard{flex:1;padding:20px;border-radius:10px;color:white;text-align:center;}
.total{background:#1e90ff}
.borrow{background:#ff4757}
.free{background:#2ed573}

/* TABLE */
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ccc;padding:8px;text-align:center}

/* STATUS */
.selected-row{background:#2ed573;color:white}
.borrowed-row{background:#ff6b6b;color:white}

#reader,#reader-return{width:300px;margin-top:10px}

/* COMMENT */
textarea{
width:100%;
height:300px;
padding:10px;
font-size:16px;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
}
</style>
</head>

<body>

<div class="sidebar">
<h2><i class="fa-solid fa-toolbox"></i> JIGシステム</h2>

<div class="menu-title">Dashboard</div>
<button onclick="show('home')">ホーム</button>
<button onclick="show('borrow')">貸出</button>
<button onclick="show('return')">返却</button>

<div class="menu-title">Monitor</div>
<button onclick="show('logs')">ログ</button>
<button onclick="show('comment')">コメント</button>

<div class="menu-title">Admin</div>
<div id="adminMenu">
<button onclick="show('admin')">管理</button>
</div>
</div>

<div class="content">

<!-- HOME -->
<div id="home" class="card">
<h2>{{username}} さん</h2>

<div class="dashboard">
<div class="dcard total">総数<br><span id="total">0</span></div>
<div class="dcard borrow">使用中<br><span id="using">0</span></div>
<div class="dcard free">空き<br><span id="free">0</span></div>
</div>

<h3>Information</h3>
<div id="infoBox"></div>
</div>

<!-- BORROW -->
<div id="borrow" class="card" style="display:none">
<h3>JIG貸出</h3>

<button onclick="startScan()">Scan</button>
<div id="reader"></div>

<table>
<tr><th>JIG</th><th>画像</th><th>操作</th></tr>
<tbody id="tb"></tbody>
</table>

<h4>選択中:</h4>
<div id="selectedList"></div>

<button onclick="confirmBorrow()">確定</button>

<h4>QRコード</h4>
<canvas id="qr"></canvas>
</div>

<!-- RETURN -->
<div id="return" class="card" style="display:none">
<h3>返却</h3>
<button onclick="startReturnScan()">Scan Return</button>
<div id="reader-return"></div>
</div>

<!-- LOG -->
<div id="logs" class="card" style="display:none">
<h3>履歴ログ</h3>

<table>
<tr>
<th>JIG</th>
<th>ユーザー</th>
<th>状態</th>
<th>時間</th>
</tr>
<tbody id="logTable"></tbody>
</table>
</div>

<!-- COMMENT -->
<div id="comment" class="card" style="display:none">
<h3>コメント</h3>

<input id="cmtJig" placeholder="対象JIG">
<textarea id="cmtText" placeholder="コメント入力"></textarea>

<button onclick="sendComment()">送信</button>
</div>

<!-- ADMIN -->
<div id="admin" class="card" style="display:none">
<h3>JIG管理</h3>

<input id="name" placeholder="JIG名">
<input id="img" placeholder="画像URL">
<button onclick="addJig()">追加</button>

<hr>
<h4>コメント管理</h4>
<div id="commentAdmin"></div>
</div>

</div>

<script>

let user = new URLSearchParams(location.search).get("user")
let selected = []
let statusData = {}

/* ================= SAFE DOM ================= */
function safeSet(id,val){
    let el = document.getElementById(id)
    if(el) el.innerText = val
}

/* ================= SAFE FETCH ================= */
async function safeFetch(url){
    try{
        let res = await fetch(url)
        let text = await res.text()
        try{
            return JSON.parse(text)
        }catch(e){
            return {ok:true,data:[]}
        }
    }catch(e){
        return {ok:true,data:[]}
    }
}

/* ================= NAV ================= */
function show(id){
    let tabs=["home","borrow","return","logs","comment","admin"]

    tabs.forEach(t=>{
        let el=document.getElementById(t)
        if(el) el.style.display="none"
    })

    let target=document.getElementById(id)
    if(target) target.style.display="block"
}

/* ================= INIT ================= */
window.onload = () => {

    let role = "{{role}}"

    if(role !== "admin"){
        let adminMenu = document.getElementById("adminMenu")
        if(adminMenu) adminMenu.style.display="none"
    }

    show("home")
    loadDashboard()
    loadInfo()
}

/* ================= DASHBOARD ================= */
async function loadDashboard(){

    let jigs = await safeFetch("/jigs")
    let status = await safeFetch("/jig-status")

    jigs = jigs.data || []
    status = status.data || {}

    let using = 0

    jigs.forEach(j=>{
        if(status[j.name] === "BORROW"){
            using++
        }
    })

    safeSet("total", jigs.length)
    safeSet("using", using)
    safeSet("free", jigs.length - using)
}

/* ================= INFO ================= */
async function loadInfo(){

    let res = await safeFetch("/comments")
    let data = res.data || []

    let box = document.getElementById("infoBox")
    if(!box) return

    box.innerHTML = ""

    data.forEach(c=>{
        box.innerHTML += `
        <div style="padding:6px;background:#fff3cd;margin:5px">
        <b>${c.jig}</b> : ${c.text}
        </div>`
    })
}

/* ================= AUTO REFRESH ================= */
setInterval(loadDashboard,5000)
setInterval(loadInfo,5000)

</script>

</body>
</html>
