<script>
let user=new URLSearchParams(location.search).get("user")
let role="{{role}}"
let selected=[]
let statusData={}

// 🔥 FIX ADMIN MENU
window.onload = () => {
    if(role !== "admin"){
        let adminMenu = document.getElementById("adminMenu")
        if(adminMenu) adminMenu.style.display="none"
    }

    show('home')
    loadDashboard()
    loadInfo()
}

// 🔥 TAB SWITCH FIX
function show(id){
    let tabs=["home","borrow","return","logs","comment","admin"]

    tabs.forEach(t=>{
        let el=document.getElementById(t)
        if(el) el.style.display="none"
    })

    let target=document.getElementById(id)
    if(target) target.style.display="block"

    if(id==="logs") loadLogs()
    if(id==="borrow") loadJigs()
}

// 🔥 DASHBOARD FIX (JIG COUNT)
async function loadDashboard(){
    let jigs = await (await fetch("/jigs")).json()
    statusData = await (await fetch("/jig-status")).json()

    let using=0
    jigs.forEach(j=>{
        if(statusData[j.name]==="BORROW") using++
    })

    document.getElementById("total").innerText=jigs.length
    document.getElementById("using").innerText=using
    document.getElementById("free").innerText=jigs.length-using
}

// INFO
async function loadInfo(){
    let data = await (await fetch("/comments")).json()
    let box=document.getElementById("infoBox")
    box.innerHTML=""

    data.forEach(c=>{
        box.innerHTML+=`
        <div style="padding:5px;background:#fff3cd;margin:5px">
        <b>${c.jig}</b> : ${c.text}
        </div>`
    })
}
setInterval(loadDashboard,5000)
setInterval(loadInfo,5000)
</script>
