<!DOCTYPE html>
<html>
<head>
<title>JIG管理システム</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body{margin:0;display:flex;font-family:Arial}

/* SIDEBAR */
.sidebar{
width:250px;
background:#2f3542;
color:white;
padding:15px;
height:100vh;
}

.menu-title{
margin-top:15px;
font-weight:bold;
}

.sidebar button{
width:100%;
margin:5px 0;
padding:10px;
background:#57606f;
color:white;
border:none;
cursor:pointer;
border-radius:5px;
}

.sidebar button:hover{background:#747d8c}

/* CONTENT */
.content{
flex:1;
padding:20px;
background:#f1f2f6;
}

/* CARD */
.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

/* TABLE */
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ccc;padding:8px;text-align:center}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>JIGシステム</h2>

<div class="menu-title">Dashboard</div>
<button onclick="show('home')">ホーム</button>
<button onclick="show('borrow')">貸出</button>
<button onclick="show('return')">返却</button>
<button onclick="show('reserve')">予約</button>

<div class="menu-title">Monitor</div>
<button onclick="show('logs')">ログ</button>
<button onclick="show('comment')">コメント</button>

<div class="menu-title">Admin</div>
<button onclick="show('admin')">管理</button>
</div>

<!-- CONTENT -->
<div class="content">

<!-- HOME -->
<div id="home" class="card">
<h2>{{username}} さん、ようこそ</h2>
<p>JIG管理システムへようこそ</p>
</div>

<!-- BORROW -->
<div id="borrow" class="card" style="display:none">
<h3>JIG貸出</h3>

<table>
<tr><th>JIG</th><th>画像</th><th>操作</th></tr>
<tbody id="tb"></tbody>
</table>

<br>
<button onclick="confirmBorrow()">確定</button>

<h4>QRコード</h4>
<canvas id="qr"></canvas>

<br>
<button onclick="saveQR()">QR保存</button>
</div>

<!-- RETURN -->
<div id="return" class="card" style="display:none">
<h3>QRをスキャンして返却</h3>
<p>スマホでQRを読み取ってください</p>
</div>

<!-- RESERVE -->
<div id="reserve" class="card" style="display:none">
<h3>予約</h3>
<input id="resJig" placeholder="JIG名">
<button onclick="reserve()">予約</button>
</div>

<!-- LOG -->
<div id="logs" class="card" style="display:none">
<h3>ログ</h3>
<div id="logList"></div>
</div>

<!-- COMMENT -->
<div id="comment" class="card" style="display:none">
<h3>コメント</h3>
<textarea id="cmt"></textarea>
<br>
<button onclick="addComment()">送信</button>
<div id="cmtList"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="card" style="display:none">
<h3>JIG管理</h3>

<input id="name" placeholder="JIG名">
<input id="img" placeholder="画像URL">
<button onclick="addJig()">追加 / 更新</button>

<hr>

<div id="adminList"></div>
</div>

</div>

<script>

let user=new URLSearchParams(location.search).get("user")
let selected=[]

// NAV
function show(id){
["home","borrow","return","reserve","logs","comment","admin"].forEach(x=>{
document.getElementById(x).style.display="none"
})
document.getElementById(id).style.display="block"
}

// LOAD JIG
async function loadJigs(){
let res=await fetch("/jigs")
let data=await res.json()

let tb=document.getElementById("tb")
let admin=document.getElementById("adminList")

tb.innerHTML=""
admin.innerHTML=""

data.forEach(j=>{

// Borrow table
let tr=document.createElement("tr")
tr.innerHTML=`
<td>${j.name}</td>
<td><img src="${j.image}" width="80"></td>
<td><button onclick="selectJig('${j.name}')">選択</button></td>
`
tb.appendChild(tr)

// Admin list
let d=document.createElement("div")
d.innerHTML=`
${j.name}
<button onclick="deleteJig('${j.name}')">削除</button>
`
admin.appendChild(d)

})
}

function selectJig(j){
if(!selected.includes(j)) selected.push(j)
alert(j+" 選択済み")
}

// BORROW
async function confirmBorrow(){
for(let j of selected){
await fetch("/borrow",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({jig_name:j,user:user})
})
}

let url=location.origin+"/return-page?jigs="+selected.join(",")
QRCode.toCanvas(document.getElementById("qr"),url)
}

// SAVE QR
function saveQR(){
let canvas=document.getElementById("qr")
let link=document.createElement("a")
link.download="jig_qr.png"
link.href=canvas.toDataURL()
link.click()
}

// ADMIN ADD
async function addJig(){
let name=document.getElementById("name").value
let img=document.getElementById("img").value

await fetch("/add-jig",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({jig_name:name,image:img})
})

loadJigs()
}

// DELETE
async function deleteJig(name){
await fetch("/delete-jig",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({jig_name:name})
})

loadJigs()
}

loadJigs()

</script>

</body>
</html>
